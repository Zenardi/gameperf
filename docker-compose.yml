services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: gameperf-prometheus
    volumes:
      - ./prometheus/gameperf.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    extra_hosts:
      - "gameperf-host:${HOST_IP}"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: gameperf-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=gameperf
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/gameperf.json:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  grafana-data:

